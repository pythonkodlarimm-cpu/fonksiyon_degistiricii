name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILD_NUMBER: ${{ github.run_number }}
      APP_VERSION: 0.1.${{ github.run_number }}

    steps:
      - name: Depoyu al
        uses: actions/checkout@v6

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Java kur
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Secret mask uygula
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Sistem paketleri
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev build-essential ccache \
            libltdl-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            libreadline-dev liblzma-dev

      - name: Android SDK ortamını ayarla
        shell: bash
        run: |
          set -euxo pipefail

          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROIDAPI=35" >> "$GITHUB_ENV"
          echo "ANDROIDMINAPI=23" >> "$GITHUB_ENV"

          SDKMANAGER_BIN="$(find /usr/local/lib/android/sdk -type f -name sdkmanager | head -n 1 || true)"
          if [ -z "$SDKMANAGER_BIN" ]; then
            echo "sdkmanager bulunamadı" >&2
            exit 1
          fi

          echo "$(dirname "$SDKMANAGER_BIN")" >> "$GITHUB_PATH"
          echo "/usr/local/lib/android/sdk/platform-tools" >> "$GITHUB_PATH"

          sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
          sudo ln -sf "$SDKMANAGER_BIN" /usr/local/lib/android/sdk/tools/bin/sdkmanager

          ls -la /usr/local/lib/android/sdk/tools/bin

      - name: Ortam kontrolü
        shell: bash
        run: |
          set -euxo pipefail
          echo "PWD=$(pwd)"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROIDAPI=$ANDROIDAPI"
          echo "ANDROIDMINAPI=$ANDROIDMINAPI"
          echo "BUILD_NUMBER=$BUILD_NUMBER"
          echo "APP_VERSION=$APP_VERSION"
          which python
          python --version
          which java
          java -version
          which javac
          javac -version
          which sdkmanager
          sdkmanager --version
          /usr/local/lib/android/sdk/tools/bin/sdkmanager --version

      - name: Android platformlarını kur
        shell: bash
        run: |
          set -euxo pipefail
          yes | /usr/local/lib/android/sdk/tools/bin/sdkmanager --licenses >/dev/null || true
          /usr/local/lib/android/sdk/tools/bin/sdkmanager "platform-tools"
          /usr/local/lib/android/sdk/tools/bin/sdkmanager "platforms;android-35"
          /usr/local/lib/android/sdk/tools/bin/sdkmanager "build-tools;35.0.0"

      - name: Kurulu Android paketlerini doğrula
        shell: bash
        run: |
          set -euxo pipefail
          /usr/local/lib/android/sdk/tools/bin/sdkmanager --list | sed -n '/Installed packages:/,/Available Packages:/p' || true
          test -f /usr/local/lib/android/sdk/platforms/android-35/android.jar
          ls -la /usr/local/lib/android/sdk/platforms
          ls -la /usr/local/lib/android/sdk/platforms/android-35
          ls -la /usr/local/lib/android/sdk/build-tools || true

      - name: Repo dosyalarını kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          test -f buildozer.spec
          test -f main.py
          test -f app/assets/icons/presplash.png
          echo "---- buildozer.spec ----"
          sed -n '1,240p' buildozer.spec
          echo "---- icons ----"
          ls -la app/assets/icons || true

      - name: Python paketleri
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33
          buildozer --version
          python -m pip show buildozer || true
          python -m pip show cython || true

      - name: Gradle bellek ayarı
        shell: bash
        run: |
          echo "GRADLE_OPTS=-Xmx4g -Dfile.encoding=UTF-8" >> "$GITHUB_ENV"
          echo "JAVA_TOOL_OPTIONS=-Xmx4g -Dfile.encoding=UTF-8" >> "$GITHUB_ENV"

      - name: gradle.properties bellek ayarı
        shell: bash
        run: |
          mkdir -p ~/.gradle
          {
            echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"
            echo "android.useAndroidX=true"
            echo "android.suppressUnsupportedCompileSdk=35"
          } >> ~/.gradle/gradle.properties
          cat ~/.gradle/gradle.properties

      - name: buildozer.spec sürümünü otomatik artır
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")

          yeni_surume = os.environ["APP_VERSION"]
          pattern = r"(?m)^version\s*=\s*.*$"

          if re.search(pattern, text):
              text = re.sub(pattern, f"version = {yeni_surume}", text, count=1)
          else:
              raise SystemExit("buildozer.spec içinde 'version =' satırı bulunamadı.")

          spec_path.write_text(text, encoding="utf-8")
          print(f"Yeni sürüm yazıldı: {yeni_surume}")
          PY

          echo "---- Güncellenmiş buildozer.spec sürüm satırı ----"
          grep -n "^version" buildozer.spec

      - name: Keystore dosyasını secret'tan oluştur
        shell: bash
        run: |
          set -euxo pipefail
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.keystore"
          test -s "${{ github.workspace }}/release.keystore"
          chmod 600 "${{ github.workspace }}/release.keystore"
          ls -lh "${{ github.workspace }}/release.keystore"

      - name: Eski build temizle
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .buildozer
          rm -rf bin
          rm -rf dist_output
          mkdir -p dist_output
          rm -f build.log
          rm -f summary.md
          rm -f env_dump.txt
          rm -f sdk_list.txt

      - name: Ortam dump al
        shell: bash
        run: |
          set -euxo pipefail
          env | sort > env_dump.txt
          /usr/local/lib/android/sdk/tools/bin/sdkmanager --list > sdk_list.txt || true

      - name: buildozer.spec artifact tipini APK yap
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")
          pattern = r"(?m)^android\.release_artifact\s*=\s*.*$"
          replacement = "android.release_artifact = apk"

          if re.search(pattern, text):
              text = re.sub(pattern, replacement, text, count=1)
          else:
              if not text.endswith("\n"):
                  text += "\n"
              text += replacement + "\n"

          spec_path.write_text(text, encoding="utf-8")
          print(replacement)
          PY

      - name: APK derle
        shell: bash
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          set -euxo pipefail
          test -f "${{ github.workspace }}/release.keystore"
          ls -lh "${{ github.workspace }}/release.keystore"
          buildozer android release 2>&1 | tee build.log
          find bin -type f -name "*.apk" -print
          APK_PATH="$(find bin -type f -name '*.apk' ! -name '*unsigned*' | head -n 1)"
          test -n "$APK_PATH"
          cp "$APK_PATH" "dist_output/$(basename "$APK_PATH")"

      - name: APK imzasını doğrula
        if: ${{ success() }}
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="$(find dist_output -type f -name '*.apk' ! -name '*unsigned*' | head -n 1)"
          test -n "$APK_PATH"
          echo "Kontrol edilen APK: $APK_PATH"
          /usr/local/lib/android/sdk/build-tools/35.0.0/apksigner verify --verbose "$APK_PATH"

      - name: APK 16 KB page size uyumluluğunu kontrol et
        if: ${{ success() }}
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="$(find dist_output -type f -name '*.apk' ! -name '*unsigned*' | head -n 1)"
          test -n "$APK_PATH"
          echo "16 KB kontrol edilen APK: $APK_PATH"
          /usr/local/lib/android/sdk/build-tools/35.0.0/zipalign -c -P 16 -v 4 "$APK_PATH"

      - name: AAB için temiz build hazırlığı
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .buildozer
          rm -rf bin

      - name: buildozer.spec artifact tipini AAB yap
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")
          pattern = r"(?m)^android\.release_artifact\s*=\s*.*$"
          replacement = "android.release_artifact = aab"

          if re.search(pattern, text):
              text = re.sub(pattern, replacement, text, count=1)
          else:
              if not text.endswith("\n"):
                  text += "\n"
              text += replacement + "\n"

          spec_path.write_text(text, encoding="utf-8")
          print(replacement)
          PY

      - name: AAB derle
        shell: bash
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          set -euxo pipefail
          buildozer android release 2>&1 | tee -a build.log
          find bin -type f -name "*.aab" -print
          AAB_PATH="$(find bin -type f -name '*.aab' | head -n 1)"
          test -n "$AAB_PATH"
          cp "$AAB_PATH" "dist_output/$(basename "$AAB_PATH")"

      - name: AAB dosyasını doğrula
        if: ${{ success() }}
        shell: bash
        run: |
          set -euxo pipefail
          AAB_PATH="$(find dist_output -type f -name '*.aab' | head -n 1)"
          test -n "$AAB_PATH"
          echo "Kontrol edilen AAB: $AAB_PATH"
          unzip -t "$AAB_PATH" >/dev/null

      - name: Hata özeti hazırla
        if: ${{ failure() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          log_text = oku("build.log")
          ansi_re = re.compile(r"\x1b\[[0-9;]*[A-Za-z]")
          clean = ansi_re.sub("", log_text)
          lines = clean.splitlines()

          anahtarlar = (
              "error",
              "failed",
              "exception",
              "traceback",
              "build failed",
              "requested api target",
              "sdkmanager",
              "command failed",
              "android api",
              "ndk",
              "gradle",
              "outofmemoryerror",
              "java.lang.outofmemoryerror",
              "no such file",
              "sdk path",
              "does not exist",
              "keystore",
              "apksigner",
              "zipalign",
              "16 kb",
              "alias",
              "release",
              "unsigned",
              "p4a_release",
              "validatesigningrelease",
              "signreleasebundle",
              "bundlerelease",
          )

          parcali = []
          for i, line in enumerate(lines):
              low = line.lower()
              if any(k in low for k in anahtarlar):
                  start = max(0, i - 8)
                  end = min(len(lines), i + 24)
                  parca = "\n".join(lines[start:end]).strip()
                  if parca and parca not in parcali:
                      parcali.append(parca)

          out = []
          out.append("## Android build hata özeti")
          out.append("")

          if parcali:
              for idx, parca in enumerate(parcali[:10], 1):
                  out.append(f"### Kritik parça {idx}")
                  out.append("```text")
                  out.append(parca)
                  out.append("```")
                  out.append("")
          else:
              out.append("### Son 250 satır")
              out.append("```text")
              out.append("\n".join(lines[-250:]))
              out.append("```")

          spec = oku("buildozer.spec")
          if spec:
              out.append("")
              out.append("## buildozer.spec özeti")
              out.append("```ini")
              out.append("\n".join(spec.splitlines()[:240]))
              out.append("```")

          env_dump = oku("env_dump.txt")
          if env_dump:
              secili = []
              for line in env_dump.splitlines():
                  if any(k in line for k in [
                      "ANDROID",
                      "JAVA_HOME",
                      "pythonLocation",
                      "GITHUB_WORKSPACE",
                      "RUNNER_OS",
                      "BUILD_NUMBER",
                      "APP_VERSION",
                      "GRADLE_OPTS",
                      "JAVA_TOOL_OPTIONS",
                  ]):
                      secili.append(line)
              out.append("")
              out.append("## Ortam özeti")
              out.append("```text")
              out.append("\n".join(secili[:160]))
              out.append("```")

          Path("summary.md").write_text("\n".join(out), encoding="utf-8")
          PY

      - name: Hata özetini GitHub Summary'ye yaz
        if: ${{ failure() }}
        shell: bash
        run: |
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build log ve teşhis dosyalarını yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ env.APP_VERSION }}
          path: |
            build.log
            summary.md
            env_dump.txt
            sdk_list.txt
            buildozer.spec
          if-no-files-found: warn

      - name: APK yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: fonksiyon-degistirici-apk-${{ env.APP_VERSION }}
          path: dist_output/*.apk
          if-no-files-found: warn

      - name: AAB yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: fonksiyon-degistirici-aab-${{ env.APP_VERSION }}
          path: dist_output/*.aab
          if-no-files-found: warn
