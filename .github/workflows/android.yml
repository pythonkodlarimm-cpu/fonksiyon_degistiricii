name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Depoyu al
        uses: actions/checkout@v6

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Java kur
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK ortamini ayarla
        shell: bash
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROIDAPI=31" >> "$GITHUB_ENV"
          echo "ANDROIDMINAPI=21" >> "$GITHUB_ENV"
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "/usr/local/lib/android/sdk/platform-tools" >> "$GITHUB_PATH"

      - name: Sistem paketleri
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev build-essential ccache \
            libltdl-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            libreadline-dev liblzma-dev

      - name: Android platformlarini kur
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-31"
          sdkmanager "build-tools;31.0.0"

      - name: Kurulu Android paketlerini goster
        shell: bash
        run: |
          sdkmanager --list | sed -n '/Installed packages:/,/Available Packages:/p' || true

      - name: Python paketleri
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33

      - name: Eski build temizle
        shell: bash
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -f build.log
          rm -f summary.md

      - name: APK derle
        shell: bash
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log

      - name: Hata ozeti hazirla
        if: ${{ failure() }}
        shell: bash
        run: |
          python - << 'PY'
          from pathlib import Path
          import re

          log_path = Path("build.log")
          text = log_path.read_text(encoding="utf-8", errors="ignore") if log_path.exists() else ""

          ansi_re = re.compile(r"\x1b\[[0-9;]*[A-Za-z]")
          clean = ansi_re.sub("", text)
          lines = clean.splitlines()

          keywords = (
              "error",
              "failed",
              "exception",
              "traceback",
              "build failed",
              "sdkmanager",
              "no such file",
              "command failed",
          )

          chunks = []
          for i, line in enumerate(lines):
              low = line.lower()
              if any(k in low for k in keywords):
                  start = max(0, i - 8)
                  end = min(len(lines), i + 20)
                  chunk = "\n".join(lines[start:end]).strip()
                  if chunk and chunk not in chunks:
                      chunks.append(chunk)

          out = []
          out.append("## Android build hata özeti")
          out.append("")

          if chunks:
              for idx, chunk in enumerate(chunks[:5], 1):
                  out.append(f"### Kritik parça {idx}")
                  out.append("```text")
                  out.append(chunk)
                  out.append("```")
                  out.append("")
          else:
              out.append("### Son 200 satır")
              out.append("```text")
              out.append("\n".join(lines[-200:]))
              out.append("```")

          Path("summary.md").write_text("\n".join(out), encoding="utf-8")
          PY

      - name: Hata ozetini GitHub Summary'ye yaz
        if: ${{ failure() }}
        shell: bash
        run: |
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build log yukle
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: build-log
          path: |
            build.log
            summary.md
          if-no-files-found: warn

      - name: APK yukle
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: fonksiyon-degistirici-apk
          path: bin/*.apk
          if-no-files-found: warn
