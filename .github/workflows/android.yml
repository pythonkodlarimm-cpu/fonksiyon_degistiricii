name: Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Hangi çıktı üretilecek?"
        required: true
        default: "aab"
        type: choice
        options:
          - apk
          - aab
          - both
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILD_NUMBER: ${{ github.run_number }}
      APP_VERSION: 0.1.${{ github.run_number }}
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'aab' }}

    steps:
      - name: Depoyu al
        uses: actions/checkout@v6

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Java kur
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Secret mask uygula
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Sistem paketleri
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev build-essential ccache \
            libltdl-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            libreadline-dev liblzma-dev

      - name: Android SDK ortamını ayarla
        shell: bash
        run: |
          set -euxo pipefail

          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROIDAPI=34" >> "$GITHUB_ENV"
          echo "ANDROIDMINAPI=21" >> "$GITHUB_ENV"

          SDKMANAGER_BIN="$(find /usr/local/lib/android/sdk -type f -name sdkmanager | head -n 1 || true)"
          if [ -z "$SDKMANAGER_BIN" ]; then
            echo "sdkmanager bulunamadı" >&2
            exit 1
          fi

          echo "$(dirname "$SDKMANAGER_BIN")" >> "$GITHUB_PATH"
          echo "/usr/local/lib/android/sdk/platform-tools" >> "$GITHUB_PATH"

          sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
          sudo ln -sf "$SDKMANAGER_BIN" /usr/local/lib/android/sdk/tools/bin/sdkmanager

      - name: Android platformlarını kur
        shell: bash
        run: |
          set -euxo pipefail
          yes | /usr/local/lib/android/sdk/tools/bin/sdkmanager --licenses >/dev/null || true
          /usr/local/lib/android/sdk/tools/bin/sdkmanager "platform-tools"
          /usr/local/lib/android/sdk/tools/bin/sdkmanager "platforms;android-34"
          /usr/local/lib/android/sdk/tools/bin/sdkmanager "build-tools;34.0.0"

      - name: Python paketleri
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33
          buildozer --version

      - name: buildozer.spec sürümünü otomatik artır
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")

          yeni_surume = os.environ["APP_VERSION"]
          pattern = r"(?m)^version\s*=\s*.*$"

          if re.search(pattern, text):
              text = re.sub(pattern, f"version = {yeni_surume}", text, count=1)
          else:
              raise SystemExit("buildozer.spec içinde 'version =' satırı bulunamadı.")

          spec_path.write_text(text, encoding="utf-8")
          print(f"Yeni sürüm yazıldı: {yeni_surume}")
          PY

      - name: Keystore dosyasını secret'tan oluştur
        shell: bash
        run: |
          set -euxo pipefail
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.keystore"
          test -s "${{ github.workspace }}/release.keystore"
          chmod 600 "${{ github.workspace }}/release.keystore"

      - name: Eski build temizle
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .buildozer
          rm -rf bin
          rm -rf dist_output
          mkdir -p dist_output
          rm -f build.log
          rm -f build_sanitized.log
          rm -f summary.md
          rm -f env_dump.txt
          rm -f sdk_list.txt

      - name: Ortam dump al (güvenli)
        shell: bash
        run: |
          set -euxo pipefail
          env | sort | grep -E "ANDROID|JAVA_HOME|pythonLocation|RUNNER_OS|BUILD_NUMBER|APP_VERSION|BUILD_TYPE" > env_dump.txt
          /usr/local/lib/android/sdk/tools/bin/sdkmanager --list > sdk_list.txt || true

      - name: Artifact tipini güncelle
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          artifact = os.environ["ARTIFACT_TYPE"].strip()
          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")

          pattern = r"(?m)^android\.release_artifact\s*=\s*.*$"
          replacement = f"android.release_artifact = {artifact}"

          if re.search(pattern, text):
              text = re.sub(pattern, replacement, text, count=1)
          else:
              if not text.endswith("\n"):
                  text += "\n"
              text += replacement + "\n"

          spec_path.write_text(text, encoding="utf-8")
          print(replacement)
          PY
        env:
          ARTIFACT_TYPE: ${{ env.BUILD_TYPE == 'both' && 'apk' || env.BUILD_TYPE }}

      - name: APK derle
        if: ${{ env.BUILD_TYPE == 'apk' || env.BUILD_TYPE == 'both' }}
        shell: bash
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          set -euxo pipefail
          buildozer android release 2>&1 | tee build.log
          APK_PATH="$(find bin -type f -name '*.apk' ! -name '*unsigned*' | head -n 1)"
          test -n "$APK_PATH"
          cp "$APK_PATH" "dist_output/$(basename "$APK_PATH")"

      - name: APK imzasını doğrula
        if: ${{ success() && (env.BUILD_TYPE == 'apk' || env.BUILD_TYPE == 'both') }}
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="$(find dist_output -type f -name '*.apk' ! -name '*unsigned*' | head -n 1)"
          test -n "$APK_PATH"
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner verify --verbose "$APK_PATH"

      - name: AAB için hazırlık
        if: ${{ success() && env.BUILD_TYPE == 'both' }}
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .buildozer
          rm -rf bin
          python - <<'PY'
          from pathlib import Path
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")
          text = re.sub(
              r"(?m)^android\.release_artifact\s*=\s*.*$",
              "android.release_artifact = aab",
              text,
              count=1,
          )
          spec_path.write_text(text, encoding="utf-8")
          PY

      - name: AAB derle
        if: ${{ env.BUILD_TYPE == 'aab' || env.BUILD_TYPE == 'both' }}
        shell: bash
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          set -euxo pipefail
          if [ "${BUILD_TYPE}" = "aab" ]; then
            python - <<'PY'
            from pathlib import Path
            import re

            spec_path = Path("buildozer.spec")
            text = spec_path.read_text(encoding="utf-8")
            text = re.sub(
                r"(?m)^android\.release_artifact\s*=\s*.*$",
                "android.release_artifact = aab",
                text,
                count=1,
            )
            spec_path.write_text(text, encoding="utf-8")
            PY
          fi

          buildozer android release 2>&1 | tee -a build.log
          AAB_PATH="$(find bin -type f -name '*.aab' | head -n 1)"
          test -n "$AAB_PATH"
          cp "$AAB_PATH" "dist_output/$(basename "$AAB_PATH")"

      - name: AAB doğrula
        if: ${{ success() && (env.BUILD_TYPE == 'aab' || env.BUILD_TYPE == 'both') }}
        shell: bash
        run: |
          set -euxo pipefail
          AAB_PATH="$(find dist_output -type f -name '*.aab' | head -n 1)"
          test -n "$AAB_PATH"
          unzip -t "$AAB_PATH" >/dev/null

      - name: Logları sanitize et
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail

          if [ -f build.log ]; then
            cp build.log build_sanitized.log
            sed -i 's/\(passw\|passwd\|password\)[^ ]*/***MASKED***/gi' build_sanitized.log
            sed -i 's/\(key\|alias\)[^ ]*/***MASKED***/gi' build_sanitized.log
            sed -i 's/AKIA[0-9A-Z]\{16\}/***MASKED***/g' build_sanitized.log
            sed -i 's/ghp_[A-Za-z0-9]\{30,\}/***MASKED***/g' build_sanitized.log
            sed -i 's/[A-Za-z0-9+\/=]\{40,\}/***MASKED***/g' build_sanitized.log
          else
            touch build_sanitized.log
          fi

      - name: Build log ve teşhis dosyalarını yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ env.APP_VERSION }}
          path: |
            build_sanitized.log
            env_dump.txt
            sdk_list.txt
            buildozer.spec
          if-no-files-found: warn

      - name: APK yükle
        if: ${{ success() && (env.BUILD_TYPE == 'apk' || env.BUILD_TYPE == 'both') }}
        uses: actions/upload-artifact@v4
        with:
          name: fonksiyon-degistirici-apk-${{ env.APP_VERSION }}
          path: dist_output/*.apk
          if-no-files-found: warn

      - name: AAB yükle
        if: ${{ success() && (env.BUILD_TYPE == 'aab' || env.BUILD_TYPE == 'both') }}
        uses: actions/upload-artifact@v4
        with:
          name: fonksiyon-degistirici-aab-${{ env.APP_VERSION }}
          path: dist_output/*.aab
          if-no-files-found: warn
