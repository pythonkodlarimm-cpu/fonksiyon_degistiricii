name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Depoyu al
        uses: actions/checkout@v6

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Java kur
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build araçlarını kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev build-essential ccache \
            libltdl-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            libreadline-dev liblzma-dev

      - name: Python paketlerini kur
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33

      - name: Eski build temizle
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -f build.log

      - name: Buildozer ile APK derle
        shell: bash
        run: |
          set -o pipefail
          echo "::group::Buildozer debug build"
          buildozer -v android debug 2>&1 | tee build.log
          echo "::endgroup::"

      - name: Build log yukle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: APK veya bin klasorunu yukle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-ciktilari
          path: |
            bin/*.apk
            bin/
          if-no-files-found: warn
