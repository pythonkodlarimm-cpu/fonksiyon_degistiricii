name: Android Build (APK + AAB)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILD_NUMBER: ${{ github.run_number }}
      APP_VERSION: 0.1.${{ github.run_number }}
      APP_VERSION_CODE: ${{ github.run_number }}
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROIDAPI: "35"
      ANDROIDMINAPI: "23"
      FORCED_NDK_VERSION: "28.2.13676358"
      FORCED_NDK_PATH: "/usr/local/lib/android/sdk/ndk/28.2.13676358"

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Secret mask uygula
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Sistem paketleri
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-setuptools \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo6 cmake \
            libffi-dev libssl-dev build-essential ccache \
            libltdl-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            libreadline-dev liblzma-dev gettext file

      - name: Android SDK ortamını ayarla
        shell: bash
        run: |
          set -euxo pipefail

          SDKMANAGER_BIN="$(find "$ANDROID_SDK_ROOT" -type f -name sdkmanager | head -n 1 || true)"
          if [ -z "$SDKMANAGER_BIN" ]; then
            echo "sdkmanager bulunamadı" >&2
            exit 1
          fi

          echo "$(dirname "$SDKMANAGER_BIN")" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

          sudo mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          sudo ln -sf "$SDKMANAGER_BIN" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"

          echo "ANDROIDNDK=$FORCED_NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$FORCED_NDK_PATH" >> "$GITHUB_ENV"

      - name: Ortam kontrolü
        shell: bash
        run: |
          set -euxo pipefail
          echo "PWD=$(pwd)"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROIDAPI=$ANDROIDAPI"
          echo "ANDROIDMINAPI=$ANDROIDMINAPI"
          echo "BUILD_NUMBER=$BUILD_NUMBER"
          echo "APP_VERSION=$APP_VERSION"
          echo "APP_VERSION_CODE=$APP_VERSION_CODE"
          echo "FORCED_NDK_VERSION=$FORCED_NDK_VERSION"
          echo "FORCED_NDK_PATH=$FORCED_NDK_PATH"
          echo "ANDROIDNDK=$ANDROIDNDK"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          which python
          python --version
          which java
          java -version
          which javac
          javac -version
          which sdkmanager
          sdkmanager --version

      - name: Android platformlarını kur
        shell: bash
        run: |
          set -euxo pipefail
          yes | "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" "platform-tools"
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" "platforms;android-35"
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" "build-tools;35.0.0"
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" "ndk;28.2.13676358"

      - name: Kurulu Android paketlerini doğrula
        shell: bash
        run: |
          set -euxo pipefail
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --list | sed -n '/Installed packages:/,/Available Packages:/p' || true
          test -f "$ANDROID_SDK_ROOT/platforms/android-35/android.jar"
          test -d "$FORCED_NDK_PATH"
          ls -la "$ANDROID_SDK_ROOT/platforms"
          ls -la "$ANDROID_SDK_ROOT/platforms/android-35"
          ls -la "$ANDROID_SDK_ROOT/build-tools/35.0.0"
          ls -la "$FORCED_NDK_PATH"

      - name: Repo dosyalarını kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          test -f buildozer.spec
          test -f main.py
          test -f app/assets/icons/presplash.png
          test -f .android/AndroidManifest.xml

          echo "---- buildozer.spec ----"
          sed -n '1,260p' buildozer.spec

          echo "---- AndroidManifest ----"
          sed -n '1,200p' .android/AndroidManifest.xml

          echo "---- icons ----"
          ls -la app/assets/icons || true

      - name: Python paketleri
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install "buildozer>=1.5.0" "cython==0.29.33"
          buildozer --version
          python -m pip show buildozer || true
          python -m pip show cython || true

      - name: Gradle bellek ayarı
        shell: bash
        run: |
          echo "GRADLE_OPTS=-Xmx4g -Dfile.encoding=UTF-8" >> "$GITHUB_ENV"
          echo "JAVA_TOOL_OPTIONS=-Xmx4g -Dfile.encoding=UTF-8" >> "$GITHUB_ENV"

      - name: gradle.properties bellek ayarı
        shell: bash
        run: |
          mkdir -p ~/.gradle
          {
            echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"
            echo "android.useAndroidX=true"
            echo "android.suppressUnsupportedCompileSdk=35"
          } > ~/.gradle/gradle.properties
          cat ~/.gradle/gradle.properties

      - name: buildozer.spec sürümünü otomatik artır
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")

          yeni_surume = os.environ["APP_VERSION"]
          yeni_numeric = os.environ["APP_VERSION_CODE"]

          version_pattern = r"(?m)^version\s*=\s*.*$"
          numeric_pattern = r"(?m)^android\.numeric_version\s*=\s*.*$"

          if re.search(version_pattern, text):
              text = re.sub(version_pattern, f"version = {yeni_surume}", text, count=1)
          else:
              raise SystemExit("buildozer.spec içinde 'version =' satırı bulunamadı.")

          if re.search(numeric_pattern, text):
              text = re.sub(numeric_pattern, f"android.numeric_version = {yeni_numeric}", text, count=1)
          else:
              if not text.endswith("\n"):
                  text += "\n"
              text += f"\nandroid.numeric_version = {yeni_numeric}\n"

          spec_path.write_text(text, encoding="utf-8")
          print(f"Yeni sürüm yazıldı: {yeni_surume}")
          print(f"Yeni numeric version yazıldı: {yeni_numeric}")
          PY

          echo "---- Güncellenmiş buildozer.spec sürüm satırları ----"
          grep -n "^version" buildozer.spec || true
          grep -n "^android.numeric_version" buildozer.spec || true

      - name: AD_ID manifest kontrolü
        shell: bash
        run: |
          set -euxo pipefail
          grep -q 'com.google.android.gms.permission.AD_ID' .android/AndroidManifest.xml

      - name: Keystore dosyasını secret'tan oluştur
        shell: bash
        run: |
          set -euxo pipefail
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.keystore"
          test -s "${{ github.workspace }}/release.keystore"
          chmod 600 "${{ github.workspace }}/release.keystore"
          ls -lh "${{ github.workspace }}/release.keystore"

      - name: Eski build temizle
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .buildozer
          rm -rf bin
          rm -rf dist_artifacts
          rm -f build_apk.log build_aab.log build.log
          rm -f summary.md
          rm -f env_dump.txt
          rm -f sdk_list.txt
          rm -f ndk_p4a_summary.md
          mkdir -p dist_artifacts

      - name: Ortam dump al
        shell: bash
        run: |
          set -euxo pipefail
          env | sort > env_dump.txt
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --list > sdk_list.txt || true

      - name: buildozer.spec artifact tipini güncelle (APK)
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")

          pattern = r"(?m)^android\.release_artifact\s*=\s*.*$"
          if re.search(pattern, text):
              text = re.sub(pattern, "android.release_artifact = apk", text, count=1)
          else:
              if not text.endswith("\n"):
                  text += "\n"
              text += "\nandroid.release_artifact = apk\n"

          spec_path.write_text(text, encoding="utf-8")
          PY

          grep -n "^android.release_artifact" buildozer.spec || true

      - name: SDL patch uygula (NDK 28 fix)
        shell: bash
        env:
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/28.2.13676358
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/28.2.13676358
        run: |
          set -euxo pipefail

          echo "Ön hazırlık için SDL kaynakları çıkarılıyor..."
          buildozer android debug || true

          echo "Bulunan SDL_androidsensor.c dosyaları:"
          find .buildozer -name "SDL_androidsensor.c" -type f -print || true

          PATCHED=0

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            echo "Patch uygulanıyor: $file"
            sed -i 's/ALooper_pollAll/ALooper_pollOnce/g' "$file"
            echo "Patch sonrası kontrol:"
            grep -n "ALooper_pollOnce\|ALooper_pollAll" "$file" || true
            PATCHED=1
          done < <(find .buildozer -name "SDL_androidsensor.c" -type f)

          if [ "$PATCHED" -ne 1 ]; then
            echo "SDL_androidsensor.c bulunamadı, patch uygulanamadı!" >&2
            exit 1
          fi

          echo "SDL patch adımı tamamlandı."

      - name: APK derle
        shell: bash
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/28.2.13676358
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/28.2.13676358
        run: |
          set -euxo pipefail
          echo "ANDROIDNDK=$ANDROIDNDK"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          ls -la "$ANDROIDNDK"
          buildozer android release 2>&1 | tee build_apk.log

      - name: APK dosyasını ayır
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="$(find bin -type f -name '*.apk' ! -name '*unsigned*' | head -n 1)"
          test -n "$APK_PATH"
          cp "$APK_PATH" "dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.apk"
          ls -lh dist_artifacts

      - name: APK imzasını doğrula
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.apk"
          test -f "$APK_PATH"
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner" verify --verbose "$APK_PATH"

      - name: APK 16 KB page size uyumluluğunu kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.apk"
          test -f "$APK_PATH"
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK_PATH"

      - name: AAB için bin klasörünü temizle
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf bin
          mkdir -p bin

      - name: buildozer.spec artifact tipini güncelle (AAB)
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")

          pattern = r"(?m)^android\.release_artifact\s*=\s*.*$"
          if re.search(pattern, text):
              text = re.sub(pattern, "android.release_artifact = aab", text, count=1)
          else:
              if not text.endswith("\n"):
                  text += "\n"
              text += "\nandroid.release_artifact = aab\n"

          spec_path.write_text(text, encoding="utf-8")
          PY

          grep -n "^android.release_artifact" buildozer.spec || true

      - name: AAB derle
        shell: bash
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/28.2.13676358
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/28.2.13676358
        run: |
          set -euxo pipefail
          echo "ANDROIDNDK=$ANDROIDNDK"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          ls -la "$ANDROIDNDK"
          buildozer android release 2>&1 | tee build_aab.log

      - name: AAB dosyasını ayır
        shell: bash
        run: |
          set -euxo pipefail
          AAB_PATH="$(find bin -type f -name '*.aab' | head -n 1)"
          test -n "$AAB_PATH"
          cp "$AAB_PATH" "dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.aab"
          ls -lh dist_artifacts

      - name: AAB imzasını doğrula
        shell: bash
        run: |
          set -euxo pipefail
          AAB_PATH="dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.aab"
          test -f "$AAB_PATH"
          jarsigner -verify -verbose -certs "$AAB_PATH"

      - name: Mapping dosyasını topla (varsa)
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist_artifacts/mapping
          find .buildozer -type f \( -name "mapping.txt" -o -name "seeds.txt" -o -name "usage.txt" \) -print -exec cp {} dist_artifacts/mapping/ \; || true
          ls -la dist_artifacts/mapping || true

      - name: NDK ve p4a özetini çıkar
        if: ${{ always() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          text = (oku("build_apk.log") + "\n" + oku("build_aab.log")).splitlines()

          patterns = [
              r"ndk",
              r"python-for-android",
              r"\bp4a\b",
              r"sdl2",
              r"python3",
              r"libSDL2",
              r"libpython",
          ]

          secilen = []
          for line in text:
              low = line.lower()
              if any(re.search(p, low) for p in patterns):
                  secilen.append(line)

          out = []
          seen = set()
          for line in secilen:
              line = line.strip()
              if line and line not in seen:
                  seen.add(line)
                  out.append(line)

          Path("ndk_p4a_summary.md").write_text(
              "## NDK / p4a özeti\n\n```text\n" +
              "\n".join(out[:250]) +
              "\n```",
              encoding="utf-8"
          )
          PY

      - name: NDK ve p4a özetini GitHub Summary'ye yaz
        if: ${{ always() }}
        shell: bash
        run: |
          cat ndk_p4a_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Hata özeti hazırla
        if: ${{ failure() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          log_text = (oku("build_apk.log") + "\n\n" + oku("build_aab.log")).strip()
          ansi_re = re.compile(r"\x1b\[[0-9;]*[A-Za-z]")
          clean = ansi_re.sub("", log_text)
          lines = clean.splitlines()

          anahtarlar = (
              "error",
              "failed",
              "exception",
              "traceback",
              "build failed",
              "requested api target",
              "sdkmanager",
              "command failed",
              "android api",
              "ndk",
              "gradle",
              "no such file",
              "sdk path",
              "does not exist",
              "keystore",
              "apksigner",
              "zipalign",
              "bundle",
              "aab",
              "apk",
              "alias",
              "release",
              "unsigned",
              "p4a_release",
              "validatesigningrelease",
          )

          parcali = []
          for i, line in enumerate(lines):
              low = line.lower()
              if any(k in low for k in anahtarlar):
                  start = max(0, i - 8)
                  end = min(len(lines), i + 24)
                  parca = "\n".join(lines[start:end]).strip()
                  if parca and parca not in parcali:
                      parcali.append(parca)

          out = []
          out.append("## Android build hata özeti")
          out.append("")

          if parcali:
              for idx, parca in enumerate(parcali[:12], 1):
                  out.append(f"### Kritik parça {idx}")
                  out.append("```text")
                  out.append(parca)
                  out.append("```")
                  out.append("")
          else:
              out.append("### Son 300 satır")
              out.append("```text")
              out.append("\n".join(lines[-300:]))
              out.append("```")

          spec = oku("buildozer.spec")
          if spec:
              out.append("")
              out.append("## buildozer.spec özeti")
              out.append("```ini")
              out.append("\n".join(spec.splitlines()[:260]))
              out.append("```")

          manifest = oku(".android/AndroidManifest.xml")
          if manifest:
              out.append("")
              out.append("## .android/AndroidManifest.xml")
              out.append("```xml")
              out.append("\n".join(manifest.splitlines()[:200]))
              out.append("```")

          env_dump = oku("env_dump.txt")
          if env_dump:
              secili = []
              for line in env_dump.splitlines():
                  if any(k in line for k in [
                      "ANDROID",
                      "JAVA_HOME",
                      "pythonLocation",
                      "GITHUB_WORKSPACE",
                      "RUNNER_OS",
                      "BUILD_NUMBER",
                      "APP_VERSION",
                      "APP_VERSION_CODE",
                      "GRADLE_OPTS",
                      "JAVA_TOOL_OPTIONS",
                      "ANDROIDNDK",
                      "ANDROID_NDK_HOME",
                      "FORCED_NDK_VERSION",
                      "FORCED_NDK_PATH",
                  ]):
                      secili.append(line)
              out.append("")
              out.append("## Ortam özeti")
              out.append("```text")
              out.append("\n".join(secili[:200]))
              out.append("```")

          Path("summary.md").write_text("\n".join(out), encoding="utf-8")
          PY

      - name: Hata özetini GitHub Summary'ye yaz
        if: ${{ failure() }}
        shell: bash
        run: |
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build log ve teşhis dosyalarını yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ env.APP_VERSION }}
          path: |
            build_apk.log
            build_aab.log
            summary.md
            ndk_p4a_summary.md
            env_dump.txt
            sdk_list.txt
            buildozer.spec
            .android/AndroidManifest.xml
            dist_artifacts/mapping/**
          if-no-files-found: warn

      - name: APK yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: fonksiyon-degistirici-apk-${{ env.APP_VERSION }}
          path: dist_artifacts/*.apk
          if-no-files-found: error

      - name: AAB yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: fonksiyon-degistirici-aab-${{ env.APP_VERSION }}
          path: dist_artifacts/*.aab
          if-no-files-found: error
