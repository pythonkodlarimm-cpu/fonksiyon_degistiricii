name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Depoyu al
        uses: actions/checkout@v6

      - name: Build cache
        uses: actions/cache@v5
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec', '.github/workflows/android.yml') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Java kur
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Sistem paketleri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev build-essential ccache \
            libltdl-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            libreadline-dev liblzma-dev

      - name: Python paketleri
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33

      - name: Eski build temizle
        run: |
          rm -rf bin
          rm -f build.log

      - name: APK derle
        shell: bash
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Hata ozeti yaz
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Android build özeti"
            echo ""
            echo '```text'
            tail -n 120 build.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build log yukle
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: APK yukle
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: fonksiyon-degistirici-apk
          path: bin/*.apk
          if-no-files-found: warn
