name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: APK derle
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          workdir: .
          buildozer_version: stable
          command: buildozer android debug

      - name: APK artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: fonksiyon-degistirici-apk-v0-1-0
          path: |
            ./.buildozer/**/*.apk
            ./bin/*.apk
