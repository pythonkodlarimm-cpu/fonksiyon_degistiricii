name: Android Build (APK + AAB)

on:
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILD_NUMBER: ${{ github.run_number }}
      APP_VERSION: 0.1.${{ github.run_number }}
      APP_VERSION_CODE: ${{ github.run_number }}

      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROIDSDK: /usr/local/lib/android/sdk
      ANDROIDSDKROOT: /usr/local/lib/android/sdk

      ANDROIDAPI: "35"
      ANDROIDMINAPI: "23"

      FORCED_NDK_VERSION: "25.2.9519653"
      FORCED_NDK_PATH: "/usr/local/lib/android/sdk/ndk/25.2.9519653"

      PYTHONUTF8: "1"
      BUNDLETOOL_VERSION: "1.18.2"

      ADMOB_APP_ID: "ca-app-pub-5522917995813710~6900495663"
      ADMOB_PERMISSION: "com.google.android.gms.permission.AD_ID"
      ADMOB_GRADLE_DEP: "com.google.android.gms:play-services-ads:22.6.0"
      TARGET_ARCHS: "arm64-v8a, armeabi-v7a"

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Secret mask uygula
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Sistem paketleri
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-setuptools \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo6 cmake \
            libffi-dev libssl-dev build-essential ccache \
            libltdl-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            libreadline-dev liblzma-dev gettext file wget curl \
            libc6-dev libstdc++6

      - name: Android SDK ortamını ayarla
        shell: bash
        run: |
          set -euxo pipefail

          SDKMANAGER_BIN=""
          if [ -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER_BIN="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          else
            SDKMANAGER_BIN="$(find "$ANDROID_SDK_ROOT" -type f -name sdkmanager | sort | head -n 1 || true)"
          fi

          if [ -z "$SDKMANAGER_BIN" ] || [ ! -x "$SDKMANAGER_BIN" ]; then
            echo "HATA: sdkmanager bulunamadı." >&2
            exit 1
          fi

          echo "SDKMANAGER_BIN=$SDKMANAGER_BIN" >> "$GITHUB_ENV"
          echo "$(dirname "$SDKMANAGER_BIN")" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

          sudo mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          sudo ln -sf "$SDKMANAGER_BIN" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          test -x "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"

          echo "ANDROIDNDK=$FORCED_NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$FORCED_NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROIDSDKROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Ortam kontrolü
        shell: bash
        run: |
          set -euxo pipefail
          echo "PWD=$(pwd)"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROIDSDK=$ANDROIDSDK"
          echo "ANDROIDSDKROOT=$ANDROIDSDKROOT"
          echo "ANDROIDAPI=$ANDROIDAPI"
          echo "ANDROIDMINAPI=$ANDROIDMINAPI"
          echo "BUILD_NUMBER=$BUILD_NUMBER"
          echo "APP_VERSION=$APP_VERSION"
          echo "APP_VERSION_CODE=$APP_VERSION_CODE"
          echo "FORCED_NDK_VERSION=$FORCED_NDK_VERSION"
          echo "FORCED_NDK_PATH=$FORCED_NDK_PATH"
          echo "ANDROIDNDK=$ANDROIDNDK"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "SDKMANAGER_BIN=$SDKMANAGER_BIN"
          which python
          python --version
          which java
          java -version
          which javac
          javac -version
          which sdkmanager || true
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --version

      - name: Android platformlarını kur
        shell: bash
        run: |
          set -euxo pipefail
          yes | "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" "platform-tools"
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" "platforms;android-35"
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" "build-tools;35.0.0"
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" "ndk;25.2.9519653"

      - name: Kurulu Android paketlerini doğrula
        shell: bash
        run: |
          set -euxo pipefail
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --list | sed -n '/Installed packages:/,/Available Packages:/p' || true
          test -f "$ANDROID_SDK_ROOT/platforms/android-35/android.jar"
          test -d "$FORCED_NDK_PATH"
          test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
          test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign"
          test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt"
          ls -la "$ANDROID_SDK_ROOT/platforms"
          ls -la "$ANDROID_SDK_ROOT/platforms/android-35"
          ls -la "$ANDROID_SDK_ROOT/build-tools/35.0.0"
          ls -la "$FORCED_NDK_PATH"

      - name: Repo dosyalarını kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          test -f buildozer.spec
          test -f main.py
          test -f app/assets/icons/presplash.png
          test -f app/assets/icons/app_icon.png

          echo "---- buildozer.spec ----"
          sed -n '1,260p' buildozer.spec

          echo "---- icons ----"
          ls -la app/assets/icons || true

      - name: Python paketleri
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "buildozer>=1.5.0" "Cython<3" packaging
          buildozer --version
          python -m pip show buildozer || true
          python -m pip show Cython || true

      - name: Gradle bellek ayarı
        shell: bash
        run: |
          echo "GRADLE_OPTS=-Xmx4g -Dfile.encoding=UTF-8" >> "$GITHUB_ENV"
          echo "JAVA_TOOL_OPTIONS=-Xmx4g -Dfile.encoding=UTF-8" >> "$GITHUB_ENV"

      - name: gradle.properties bellek ayarı
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ~/.gradle
          {
            echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"
            echo "android.useAndroidX=true"
            echo "android.suppressUnsupportedCompileSdk=35"
          } > ~/.gradle/gradle.properties
          cat ~/.gradle/gradle.properties

      - name: buildozer.spec sürüm ve android ayarlarını güncelle
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")

          yeni_surume = os.environ["APP_VERSION"]
          yeni_numeric = os.environ["APP_VERSION_CODE"]
          yeni_api = os.environ["ANDROIDAPI"]
          yeni_minapi = os.environ["ANDROIDMINAPI"]
          yeni_ndk_path = os.environ["FORCED_NDK_PATH"]
          admob_app_id = os.environ["ADMOB_APP_ID"]
          admob_permission = os.environ["ADMOB_PERMISSION"]
          admob_gradle_dep = os.environ["ADMOB_GRADLE_DEP"]
          target_archs = os.environ["TARGET_ARCHS"]

          def set_or_add(text, key, value):
              pattern = rf"(?m)^{re.escape(key)}\s*=\s*.*$"
              repl = f"{key} = {value}"
              if re.search(pattern, text):
                  return re.sub(pattern, repl, text, count=1)
              if not text.endswith("\n"):
                  text += "\n"
              return text + repl + "\n"

          def remove_key(text, key):
              pattern = rf"(?m)^{re.escape(key)}\s*=\s*.*\n?"
              return re.sub(pattern, "", text)

          text = set_or_add(text, "version", yeni_surume)
          text = set_or_add(text, "android.numeric_version", yeni_numeric)
          text = set_or_add(text, "android.api", yeni_api)
          text = set_or_add(text, "android.minapi", yeni_minapi)
          text = set_or_add(text, "android.ndk_path", yeni_ndk_path)
          text = set_or_add(text, "android.permissions", f"INTERNET,ACCESS_NETWORK_STATE,{admob_permission}")
          text = set_or_add(text, "android.gradle_dependencies", admob_gradle_dep)
          text = set_or_add(text, "android.meta_data", f"com.google.android.gms.ads.APPLICATION_ID={admob_app_id}")
          text = set_or_add(text, "android.archs", target_archs)

          text = remove_key(text, "android.add_src")
          text = remove_key(text, "android.extra_manifest_xml")

          spec_path.write_text(text, encoding="utf-8")

          print("buildozer.spec güncellendi:")
          print(f"  version = {yeni_surume}")
          print(f"  android.numeric_version = {yeni_numeric}")
          print(f"  android.api = {yeni_api}")
          print(f"  android.minapi = {yeni_minapi}")
          print(f"  android.ndk_path = {yeni_ndk_path}")
          print(f"  android.permissions = INTERNET,ACCESS_NETWORK_STATE,{admob_permission}")
          print(f"  android.gradle_dependencies = {admob_gradle_dep}")
          print(f"  android.meta_data = com.google.android.gms.ads.APPLICATION_ID={admob_app_id}")
          print(f"  android.archs = {target_archs}")
          print("  android.add_src kaldırıldı")
          print("  android.extra_manifest_xml kaldırıldı")
          PY

          echo "---- Güncellenmiş buildozer.spec satırları ----"
          grep -n "^version" buildozer.spec || true
          grep -n "^android.numeric_version" buildozer.spec || true
          grep -n "^android.api" buildozer.spec || true
          grep -n "^android.minapi" buildozer.spec || true
          grep -n "^android.ndk_path" buildozer.spec || true
          grep -n "^android.permissions" buildozer.spec || true
          grep -n "^android.gradle_dependencies" buildozer.spec || true
          grep -n "^android.meta_data" buildozer.spec || true
          grep -n "^android.archs" buildozer.spec || true
          ! grep -n "^android.add_src" buildozer.spec
          ! grep -n "^android.extra_manifest_xml" buildozer.spec

      - name: Keystore dosyasını secret'tan oluştur
        shell: bash
        run: |
          set -euxo pipefail
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.keystore"
          test -s "${{ github.workspace }}/release.keystore"
          chmod 600 "${{ github.workspace }}/release.keystore"
          ls -lh "${{ github.workspace }}/release.keystore"

      - name: Eski build temizle
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .buildozer
          rm -rf bin
          rm -rf dist_artifacts
          rm -rf adid_check
          rm -rf symbols_export
          rm -f build_apk.log build_aab.log build.log
          rm -f summary.md env_dump.txt sdk_list.txt ndk_p4a_summary.md
          rm -f bundletool.jar bundletool_version.txt symbols_so_list.txt symbols_export_warning.txt
          rm -f symbols_export/flat_symbols_list.txt
          mkdir -p dist_artifacts

      - name: Ortam dump al
        shell: bash
        run: |
          set -euxo pipefail
          env | sort > env_dump.txt
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --list > sdk_list.txt || true

      - name: buildozer.spec artifact tipini güncelle (APK)
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")
          pattern = r"(?m)^android\.release_artifact\s*=\s*.*$"

          if re.search(pattern, text):
              text = re.sub(pattern, "android.release_artifact = apk", text, count=1)
          else:
              if not text.endswith("\n"):
                  text += "\n"
              text += "\nandroid.release_artifact = apk\n"

          spec_path.write_text(text, encoding="utf-8")
          PY

          grep -n "^android.release_artifact" buildozer.spec || true

      - name: APK derle
        shell: bash
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/25.2.9519653
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROIDSDKROOT: /usr/local/lib/android/sdk
        run: |
          set -euxo pipefail
          echo "ANDROIDNDK=$ANDROIDNDK"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROIDSDK=$ANDROIDSDK"
          echo "ANDROIDSDKROOT=$ANDROIDSDKROOT"
          ls -la "$ANDROIDNDK"
          buildozer android release 2>&1 | tee build_apk.log

      - name: APK dosyasını ayır
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="$(find bin -type f -name '*.apk' ! -name '*unsigned*' | sort | head -n 1)"
          test -n "$APK_PATH"
          cp "$APK_PATH" "dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.apk"
          ls -lh dist_artifacts

      - name: APK imzasını doğrula
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.apk"
          test -f "$APK_PATH"
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner" verify --verbose "$APK_PATH"

      - name: APK 16 KB page size uyumluluğunu kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.apk"
          test -f "$APK_PATH"
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK_PATH"

      - name: buildozer.spec artifact tipini güncelle (AAB)
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          spec_path = Path("buildozer.spec")
          text = spec_path.read_text(encoding="utf-8")
          pattern = r"(?m)^android\.release_artifact\s*=\s*.*$"

          if re.search(pattern, text):
              text = re.sub(pattern, "android.release_artifact = aab", text, count=1)
          else:
              if not text.endswith("\n"):
                  text += "\n"
              text += "\nandroid.release_artifact = aab\n"

          spec_path.write_text(text, encoding="utf-8")
          PY

          grep -n "^android.release_artifact" buildozer.spec || true

      - name: AAB öncesi temiz derleme ortamı hazırla
        shell: bash
        run: |
          set -euxo pipefail
          buildozer android clean || true
          rm -rf bin
          mkdir -p bin

      - name: AAB derle
        shell: bash
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/25.2.9519653
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROIDSDKROOT: /usr/local/lib/android/sdk
        run: |
          set -euxo pipefail
          echo "ANDROIDNDK=$ANDROIDNDK"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROIDSDK=$ANDROIDSDK"
          echo "ANDROIDSDKROOT=$ANDROIDSDKROOT"
          ls -la "$ANDROIDNDK"
          buildozer android release 2>&1 | tee build_aab.log

      - name: AAB dosyasını ayır
        shell: bash
        run: |
          set -euxo pipefail
          AAB_PATH="$(find bin -type f -name '*.aab' | sort | head -n 1)"
          test -n "$AAB_PATH"
          cp "$AAB_PATH" "dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.aab"
          ls -lh dist_artifacts

      - name: bundletool indir
        shell: bash
        run: |
          set -euxo pipefail
          BUNDLETOOL_URL="https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar"
          curl -fL "$BUNDLETOOL_URL" -o bundletool.jar
          test -s bundletool.jar
          ls -lh bundletool.jar
          java -jar bundletool.jar version | tee bundletool_version.txt

      - name: AAB içinden universal APK üret
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p adid_check
          java -jar bundletool.jar build-apks \
            --bundle="dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.aab" \
            --output="adid_check/app.apks" \
            --mode=universal \
            --ks="${{ github.workspace }}/release.keystore" \
            --ks-pass=pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --ks-key-alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            --key-pass=pass:${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }} \
            --overwrite

          test -f adid_check/app.apks
          unzip -q adid_check/app.apks -d adid_check/apks
          test -f adid_check/apks/universal.apk

      - name: Universal APK içinde AD_ID ve App ID kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="adid_check/apks/universal.apk"
          test -f "$APK_PATH"

          echo "---- aapt dump permissions ----"
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt" dump permissions "$APK_PATH" | tee adid_check/aapt_permissions.txt

          echo "---- AndroidManifest xmltree ----"
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt" dump xmltree "$APK_PATH" AndroidManifest.xml | tee adid_check/manifest_tree.txt || true

          echo "---- AD_ID grep ----"
          grep -n "com.google.android.gms.permission.AD_ID" adid_check/aapt_permissions.txt || true
          grep -n "com.google.android.gms.permission.AD_ID" adid_check/manifest_tree.txt || true

          echo "---- APPLICATION_ID grep ----"
          grep -n "com.google.android.gms.ads.APPLICATION_ID" adid_check/manifest_tree.txt || true
          grep -n "ca-app-pub-5522917995813710~6900495663" adid_check/manifest_tree.txt || true

          if ! grep -q "com.google.android.gms.permission.AD_ID" adid_check/aapt_permissions.txt; then
            echo "HATA: AD_ID izni universal APK içinde bulunamadı." | tee adid_check/adid_result.txt
            exit 1
          fi

          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" adid_check/manifest_tree.txt; then
            echo "HATA: APPLICATION_ID meta-data universal APK içinde bulunamadı." | tee -a adid_check/adid_result.txt
            exit 1
          fi

          if ! grep -q "ca-app-pub-5522917995813710~6900495663" adid_check/manifest_tree.txt; then
            echo "HATA: Beklenen AdMob App ID universal APK içinde bulunamadı." | tee -a adid_check/adid_result.txt
            exit 1
          fi

          echo "AD_ID izni ve AdMob App ID universal APK içinde bulundu." | tee adid_check/adid_result.txt

      - name: AAB imzasını doğrula
        shell: bash
        run: |
          set -euxo pipefail
          AAB_PATH="dist_artifacts/fonksiyon-degistirici-${APP_VERSION}.aab"
          test -f "$AAB_PATH"
          jarsigner -verify -verbose -certs "$AAB_PATH"

      - name: Native debug symbols paketini hazırla
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf symbols_export
          mkdir -p symbols_export/raw

          find .buildozer -type f -name "*.so" | sort | tee symbols_so_list.txt || true

          if [ ! -s symbols_so_list.txt ]; then
            echo "Uyarı: Paketlenecek .so dosyası bulunamadı." | tee symbols_export_warning.txt
            exit 0
          fi

          while IFS= read -r sofile; do
            abi=""
            case "$sofile" in
              *"/arm64-v8a/"*) abi="arm64-v8a" ;;
              *"/armeabi-v7a/"*) abi="armeabi-v7a" ;;
              *"/x86_64/"*) abi="x86_64" ;;
              *"/x86/"*) abi="x86" ;;
              *)
                echo "Uyarı: ABI ayırt edilemedi, atlandı -> $sofile"
                continue
                ;;
            esac

            base_name="$(basename "$sofile")"
            dest_dir="symbols_export/raw/${abi}"
            mkdir -p "$dest_dir"

            if [ ! -f "$dest_dir/$base_name" ]; then
              cp "$sofile" "$dest_dir/$base_name"
            else
              if cmp -s "$sofile" "$dest_dir/$base_name"; then
                echo "Aynı dosya zaten var, atlandı: $dest_dir/$base_name"
              else
                alt_name="${base_name%.so}-dup.so"
                i=1
                while [ -f "$dest_dir/$alt_name" ]; do
                  alt_name="${base_name%.so}-dup${i}.so"
                  i=$((i + 1))
                done
                cp "$sofile" "$dest_dir/$alt_name"
              fi
            fi
          done < symbols_so_list.txt

          ABI_LIST=()
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            if [ -d "symbols_export/raw/$abi" ] && find "symbols_export/raw/$abi" -maxdepth 1 -type f -name "*.so" | grep -q .; then
              ABI_LIST+=("$abi")
            fi
          done

          if [ "${#ABI_LIST[@]}" -eq 0 ]; then
            echo "Uyarı: Symbols export altında geçerli ABI/.so yapısı oluşmadı." | tee symbols_export_warning.txt
            exit 0
          fi

          echo "---- Düzleştirilmiş symbols içeriği ----"
          find symbols_export/raw -maxdepth 2 -type f -name "*.so" | sort | tee symbols_export/flat_symbols_list.txt

          for abi in "${ABI_LIST[@]}"; do
            if find "symbols_export/raw/$abi" -mindepth 2 | grep -q .; then
              echo "HATA: $abi altında beklenmeyen alt klasör var." | tee -a symbols_export_warning.txt
              find "symbols_export/raw/$abi" -mindepth 2 | tee -a symbols_export_warning.txt
              exit 1
            fi
          done

          (
            cd symbols_export/raw
            zip -r "../native-debug-symbols-${APP_VERSION}.zip" "${ABI_LIST[@]}"
          )

          test -f "symbols_export/native-debug-symbols-${APP_VERSION}.zip"
          ls -lh "symbols_export/native-debug-symbols-${APP_VERSION}.zip"

          echo "---- Symbols ZIP içeriği ----"
          unzip -l "symbols_export/native-debug-symbols-${APP_VERSION}.zip" | tee symbols_export/zip_content.txt

      - name: Native debug symbols artifact yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: native-debug-symbols-${{ env.APP_VERSION }}
          path: symbols_export/native-debug-symbols-${{ env.APP_VERSION }}.zip
          if-no-files-found: warn

      - name: Mapping dosyasını topla (varsa)
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist_artifacts/mapping
          find .buildozer -type f \( -name "mapping.txt" -o -name "seeds.txt" -o -name "usage.txt" \) -print -exec cp {} dist_artifacts/mapping/ \; || true
          ls -la dist_artifacts/mapping || true

      - name: NDK / p4a / bundletool / AD_ID özetini çıkar
        if: ${{ always() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          log_text = (oku("build_apk.log") + "\n" + oku("build_aab.log")).splitlines()

          patterns = [
              r"ndk",
              r"python-for-android",
              r"\bp4a\b",
              r"sdl2",
              r"python3",
              r"libsdl2",
              r"libpython",
              r"bundletool",
              r"ad_id",
              r"advertising",
              r"permission",
              r"manifest",
          ]

          secilen = []
          for line in log_text:
              low = line.lower()
              if any(re.search(p, low) for p in patterns):
                  secilen.append(line.strip())

          temiz = []
          gorulen = set()
          for line in secilen:
              if line and line not in gorulen:
                  gorulen.add(line)
                  temiz.append(line)

          bolumler = []

          bundletool_version = oku("bundletool_version.txt").strip()
          if bundletool_version:
              bolumler.append("## Bundletool sürümü\n\n```text\n" + bundletool_version + "\n```")

          adid_result = oku("adid_check/adid_result.txt").strip()
          if adid_result:
              bolumler.append("## AD_ID sonucu\n\n```text\n" + adid_result + "\n```")

          aapt_permissions = oku("adid_check/aapt_permissions.txt")
          if aapt_permissions:
              bolumler.append("## aapt permissions\n\n```text\n" + aapt_permissions[:12000] + "\n```")

          manifest_tree = oku("adid_check/manifest_tree.txt")
          if manifest_tree:
              bolumler.append("## manifest xmltree\n\n```text\n" + manifest_tree[:12000] + "\n```")

          symbols_list = oku("symbols_so_list.txt")
          if symbols_list:
              bolumler.append("## Symbols listesi\n\n```text\n" + symbols_list[:12000] + "\n```")

          flat_symbols = oku("symbols_export/flat_symbols_list.txt")
          if flat_symbols:
              bolumler.append("## Düzleştirilmiş symbols listesi\n\n```text\n" + flat_symbols[:12000] + "\n```")

          zip_content = oku("symbols_export/zip_content.txt")
          if zip_content:
              bolumler.append("## Native debug symbols ZIP içeriği\n\n```text\n" + zip_content[:12000] + "\n```")

          log_ozet = "## NDK / p4a / bundletool log özeti\n\n```text\n" + "\n".join(temiz[:350]) + "\n```"
          bolumler.insert(0, log_ozet)

          Path("ndk_p4a_summary.md").write_text("\n\n".join(bolumler), encoding="utf-8")
          PY

      - name: NDK ve p4a özetini GitHub Summary'ye yaz
        if: ${{ always() }}
        shell: bash
        run: |
          cat ndk_p4a_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Native debug symbols özetini GitHub Summary'ye yaz
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo ""
            echo "## Native debug symbols"
            echo ""
            if [ -f "symbols_export/native-debug-symbols-${APP_VERSION}.zip" ]; then
              echo "- Paket hazır: \`native-debug-symbols-${APP_VERSION}.zip\`"
              echo "- Artifact adı: \`native-debug-symbols-${APP_VERSION}\`"
              echo "- Actions sayfasındaki **Artifacts** bölümünden indirilebilir."
              if [ -f "symbols_export/zip_content.txt" ]; then
                echo ""
                echo "### ZIP içeriği"
                echo '```text'
                cat symbols_export/zip_content.txt
                echo '```'
              fi
            else
              echo "- Uyarı: symbols zip üretilemedi."
              if [ -f symbols_export_warning.txt ]; then
                echo ""
                echo '```text'
                cat symbols_export_warning.txt
                echo '```'
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Hata özeti hazırla
        if: ${{ failure() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          log_text = (oku("build_apk.log") + "\n\n" + oku("build_aab.log")).strip()
          ansi_re = re.compile(r"\x1b\[[0-9;]*[A-Za-z]")
          clean = ansi_re.sub("", log_text)
          lines = clean.splitlines()

          anahtarlar = (
              "error", "failed", "exception", "traceback", "build failed",
              "requested api target", "sdkmanager", "command failed", "android api",
              "ndk", "gradle", "no such file", "sdk path", "does not exist",
              "keystore", "apksigner", "zipalign", "bundle", "aab", "apk",
              "alias", "release", "unsigned", "p4a_release", "validatesigningrelease",
              "ad_id", "advertising", "bundletool", "canceled", "cancelled"
          )

          parcali = []
          for i, line in enumerate(lines):
              low = line.lower()
              if any(k in low for k in anahtarlar):
                  start = max(0, i - 8)
                  end = min(len(lines), i + 24)
                  parca = "\n".join(lines[start:end]).strip()
                  if parca and parca not in parcali:
                      parcali.append(parca)

          out = ["## Android build hata özeti", ""]

          if parcali:
              for idx, parca in enumerate(parcali[:15], 1):
                  out.append(f"### Kritik parça {idx}")
                  out.append("```text")
                  out.append(parca)
                  out.append("```")
                  out.append("")
          else:
              out.append("### Son 300 satır")
              out.append("```text")
              out.append("\n".join(lines[-300:]))
              out.append("```")

          bundletool_version = oku("bundletool_version.txt")
          if bundletool_version:
              out.extend(["", "## Bundletool sürümü", "```text", bundletool_version[:4000], "```"])

          for extra in [
              "adid_check/adid_result.txt",
              "adid_check/aapt_permissions.txt",
              "adid_check/manifest_tree.txt",
              "symbols_so_list.txt",
              "symbols_export/flat_symbols_list.txt",
              "symbols_export/zip_content.txt",
          ]:
              txt = oku(extra)
              if txt:
                  out.extend(["", f"## {extra}", "```text", txt[:12000], "```"])

          spec = oku("buildozer.spec")
          if spec:
              out.extend(["", "## buildozer.spec özeti", "```ini", "\n".join(spec.splitlines()[:260]), "```"])

          env_dump = oku("env_dump.txt")
          if env_dump:
              secili = []
              for line in env_dump.splitlines():
                  if any(k in line for k in [
                      "ANDROID", "JAVA_HOME", "pythonLocation", "GITHUB_WORKSPACE",
                      "RUNNER_OS", "BUILD_NUMBER", "APP_VERSION", "APP_VERSION_CODE",
                      "GRADLE_OPTS", "JAVA_TOOL_OPTIONS", "ANDROIDNDK", "ANDROID_NDK_HOME",
                      "FORCED_NDK_VERSION", "FORCED_NDK_PATH", "SDKMANAGER_BIN"
                  ]):
                      secili.append(line)
              out.extend(["", "## Ortam özeti", "```text", "\n".join(secili[:250]), "```"])

          Path("summary.md").write_text("\n".join(out), encoding="utf-8")
          PY

      - name: Hata özetini GitHub Summary'ye yaz
        if: ${{ failure() }}
        shell: bash
        run: |
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build log ve teşhis dosyalarını yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ env.APP_VERSION }}
          path: |
            build_apk.log
            build_aab.log
            summary.md
            ndk_p4a_summary.md
            env_dump.txt
            sdk_list.txt
            buildozer.spec
            bundletool.jar
            bundletool_version.txt
            adid_check/**
            dist_artifacts/mapping/**
            symbols_so_list.txt
            symbols_export/**
            symbols_export_warning.txt
          if-no-files-found: warn

      - name: APK yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: fonksiyon-degistirici-apk-${{ env.APP_VERSION }}
          path: dist_artifacts/*.apk
          if-no-files-found: error

      - name: AAB yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: fonksiyon-degistirici-aab-${{ env.APP_VERSION }}
          path: dist_artifacts/*.aab
          if-no-files-found: error
