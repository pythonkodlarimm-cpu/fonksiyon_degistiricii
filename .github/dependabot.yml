version: 2

updates:
  # 🔹 Python bağımlılıkları (requirements.txt vs.)
  - package-ecosystem: "pip"
    directory: "/" 
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "YOUR_USERNAME"
    commit-message:
      prefix: "pip"
    labels:
      - "dependencies"
      - "python"

  # 🔹 GitHub Actions (android.yml dahil)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
